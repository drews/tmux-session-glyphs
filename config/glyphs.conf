# tmux-session-glyphs — repo defaults
# Shell-sourceable. Do not edit; override in ~/.config/tmux-session-glyphs.conf
# or via TSG_* environment variables.

# Theme: nerd | ascii
: "${TSG_THEME:=nerd}"

# Identity source (JSON: { "<session>": { "icon": "🔴", "color": "#f38ba8" } })
: "${TSG_EMOJI_FILE:=$HOME/.local/share/tmux/resurrect/session-emoji.json}"

# Colors (hex; tmux accepts #rrggbb)
: "${TSG_DIM_COLOR:=#585b70}"      # unattached / idle identity
: "${TSG_CURRENT_FALLBACK_COLOR:=#cdd6f4}"  # current session when no identity color available
: "${TSG_BELL_COLOR:=#f38ba8}"     # red — bell alert
: "${TSG_ACTIVITY_COLOR:=#f9e2af}" # yellow — activity
: "${TSG_LONGJOB_COLOR:=#89dceb}"  # cyan — long job (v1.1)

# Long-job threshold in seconds (v1.1)
: "${TSG_LONGJOB_SECS:=60}"

# Default identity fallback glyph (when session has no entry in emoji file)
: "${TSG_DEFAULT_GLYPH:=●}"

# State glyphs — nerd theme (Nerd Font private-use codepoints)
: "${TSG_GLYPH_BELL_NERD:=}"       # nf-fa-bell (U+F0F3)
: "${TSG_GLYPH_ACTIVITY_NERD:=}"   # nf-fa-bolt (U+F0E7)
: "${TSG_GLYPH_LONGJOB_NERD:=}"    # nf-fa-hourglass_half (U+F252)

# State glyphs — ascii theme
: "${TSG_GLYPH_BELL_ASCII:=b}"
: "${TSG_GLYPH_ACTIVITY_ASCII:=!}"
: "${TSG_GLYPH_LONGJOB_ASCII:=+}"
: "${TSG_GLYPH_DEFAULT_ASCII:=*}"  # ascii identity fallback (no emoji file)
